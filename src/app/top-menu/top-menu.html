<header class="bg-white shadow fixed h-16 flex items-center w-full z-10">
  <div class="container mx-auto px-4 flex gap-4 justify-between items-center">
    <div class="flex items-baseline gap-3">
      <h1 class="text-3xl font-bold text-gray-800">InmoSanvi</h1>
      <p class="text-gray-600 hidden lg:block">Find your dream home</p>
    </div>

    <nav class="flex gap-3 items-center">
      <a routerLink="/properties" routerLinkActive="font-semibold" class="text-gray-600 hover:text-gray-900">
        Home
      </a>
      @if (isLogged()) {
      <a routerLink="/properties/add" routerLinkActive="font-semibold" class="text-gray-600 hover:text-gray-900">
        New Property
      </a>

      <a routerLink="/profile" title="Profile" class="text-gray-600 hover:text-gray-900">
        <svg class="icon" width="24" height="24">
          <use href="icons/profile.svg#profile"></use>
        </svg>
      </a>

      <a (click)="logout()" title="Logout" class="text-gray-600 hover:text-gray-900 cursor-pointer">
        <svg class="icon" width="24" height="24">
          <use href="icons/logout.svg#logout"></use>
        </svg>
      </a>
      } @else {
      <a routerLink="/login" title="Login" class="text-gray-600 hover:text-gray-900">
        <svg class="icon" width="24" height="24">
          <use href="icons/login.svg#login"></use>
        </svg>
      </a>

      <a routerLink="/register" title="Register" class="text-gray-600 hover:text-gray-900">
        <svg class="icon" width="24" height="24">
          <use href="icons/register.svg#register"></use>
        </svg>
      </a>

      }
    </nav>
  </div>
</header>
