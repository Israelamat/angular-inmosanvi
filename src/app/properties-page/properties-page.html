<main class="container mx-auto px-4 py-8 mt-16 grow">
  <section id="add-property" class="mb-12">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Add New Property</h2>
    <app-property-form (added)="addProperty($event)"></app-property-form>
  </section>

  <section>
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Properties for Sale</h2>
    <div id="property-listings" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (property of properties; track property.id) {
      <app-property-card (deleted)="deleteProperty($event)" [property]="property"></app-property-card>
      }@empty {
      <p class="text-2xl text-gray-500">No properties found.</p>
      }
    </div>
  </section>
</main>
