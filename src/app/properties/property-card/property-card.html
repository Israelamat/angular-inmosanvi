<div class="bg-white rounded-lg shadow-md flex flex-col relative overflow-visible">
    @if (canDelete()) {
    <button (click)="deleteProperty()"
        class="absolute -right-3 -top-3 rounded-full text-white bg-red-700 p-1 shadow-md hover:bg-red-600">
        <svg class="icon" width="24" height="24">
            <use href="icons/close.svg#close"></use>
        </svg>
    </button>
    }
    @if (canEdit()) {
    <a [routerLink]="['/properties/edit', property().id]" class="absolute right-8 -top-3 rounded-full text-white bg-blue-700 p-1 shadow-md hover:bg-blue-600">
        <svg width="24" height="24">
            <use href="icons/edit.svg#edit"></use>
        </svg>
    </a>

    }
    <a [routerLink]="['/properties', property().id]">
        <img [src]="property().mainPhoto" alt="Photo of the property" class="w-full aspect-16/10 object-cover">
        <div class="p-6 flex flex-col grow">
            <h3 class="text-xl font-bold text-gray-800 mb-2">{{ property().title }}</h3>
            <p class="text-gray-600 mb-4 grow">{{ property().address }}</p>
            <p class="text-lg font-semibold text-gray-900 mb-4">{{ property().price | intlCurrency: "EUR": "en-US": 0}}
            </p>
            <div class="flex justify-between text-gray-700">
                <span>{{ property().sqmeters }} m2</span>
                <span>{{ property().numRooms }} beds</span>
                <span>{{ property().numBaths }} baths</span>
            </div>
        </div>
    </a>
</div>
