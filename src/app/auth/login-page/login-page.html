<main class="container mx-auto px-4 py-8 mt-16 grow flex items-center justify-center">
  <div class="w-full max-w-xl">
    <form class="bg-white p-8 rounded-lg shadow-md" (submit)="login($event)">
      <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center">
        Log in
      </h2>

      <!-- Email -->
      <div class="mb-6">
        <label class="block text-gray-700 font-bold mb-2">
          Email
        </label>

        <input type="email" [value]="loginForm.email().value()"
          (input)="loginForm.email().value.set($any($event.target).value)"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />

        @for (error of loginForm.email().errors(); track error.kind) {
        <div class="text-sm text-red-700">
          {{ error.message }}
        </div>
        }
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-gray-700 font-bold mb-2">
          Password
        </label>

        <input type="password" [value]="loginForm.password().value()"
          (input)="loginForm.password().value.set($any($event.target).value)"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />

        @for (error of loginForm.password().errors(); track error.kind) {
        <div class="text-sm text-red-700">
          {{ error.message }}s
        </div>
        }
      </div>
      <div class="mb-6 flex flex-col sm:flex-row items-center justify-center gap-4">
        <div class="mb-6 flex flex-col sm:flex-row items-center justify-center gap-4">
          <div
            class="w-64 h-12 flex items-center justify-center border border-gray-300 rounded-lg overflow-hidden bg-white">
            <div appGoogleLogin class="w-full h-full" (login)="loggedGoogle($event)"></div>
          </div>
          @if (errorMessage) {
          <div class="error-msg">
            {{ errorMessage }}
          </div>
          }xº
          <button fbLogin [scopes]="['email', 'public_profile']"
            class="w-64 h-11 bg-[#1877F2] hover:bg-[#166fe5] text-white flex items-center justify-center gap-3 rounded-lg font-medium transition-all shadow-sm"
            (loginOk)="loggedFacebook($event)">
            <!-- (loginError)="showError($event)" -->

            <fa-icon [icon]="iconFacebook" class="text-xl"></fa-icon>
            <span class="text-sm">Login con Facebook</span>
          </button>
        </div>
      </div>
      <app-load-button class="w-full" [loading]="isSubmitting()"
        colorClass="w-full bg-blue-500 text-white font-bold py-3 px-4 rounded-lg disabled:bg-blue-300 hover:bg-blue-600"
        type="submit">
        Login
      </app-load-button>
      <!-- Register -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
          Don't have an account yet?
          <a routerLink="/auth/register" class="text-blue-600 font-medium">
            Register here
          </a>
        </p>
      </div>
    </form>
  </div>
</main>
